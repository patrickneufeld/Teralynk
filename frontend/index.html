<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ✅ Standard Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a58ca" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Teralynk - Elevate teamwork with seamless cloud collaboration and AI-powered productivity." />
    <meta name="keywords" content="cloud storage, collaboration, AI productivity, file sharing, teamwork, remote work" />
    <meta name="author" content="Teralynk Team" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="Teralynk" />
    <meta name="color-scheme" content="light dark" />

    <!-- ✅ Open Graph (Social Sharing) -->
    <meta property="og:title" content="Teralynk - The Future of Collaborative Cloud Storage" />
    <meta property="og:description" content="Elevate teamwork with seamless cloud collaboration and AI-powered productivity." />
    <meta property="og:image" content="https://teralynk.com/social-preview.png" />
    <meta property="og:url" content="https://teralynk.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Teralynk" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Teralynk - The Future of Collaborative Cloud Storage" />
    <meta name="twitter:description" content="Elevate teamwork with seamless cloud collaboration and AI-powered productivity." />
    <meta name="twitter:image" content="https://teralynk.com/social-preview.png" />
    <meta name="twitter:site" content="@Teralynk" />

    <!-- ✅ PWA & Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ✅ Google reCAPTCHA v3 Script -->
    <script
      src="https://www.google.com/recaptcha/api.js?render=6LfywVIrAAAAAF2XDFV4Zcxbdta21lclRfA0I_8p"
      async
      defer
    ></script>

    <!-- ✅ Critical CSS -->
    <style>
      :root {
        --bg-light: #ffffff;
        --text-light: #1a1a1a;
        --bg-dark: #1a1a1a;
        --text-dark: #ffffff;
      }

      html {
        background-color: var(--bg-light);
        color: var(--text-light);
      }

      @media (prefers-color-scheme: dark) {
        html {
          background-color: var(--bg-dark);
          color: var(--text-dark);
        }
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      #root,
      #portal-root {
        height: 100%;
        width: 100%;
      }

      .initial-loading {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: inherit;
        color: inherit;
      }

      .loading-spinner {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <!-- ✅ Environment Configuration -->
    <script>
      window.ENV = {
        API_URL: 'http://localhost:5001',
        WS_URL:
          window.location.protocol === 'https:'
            ? 'wss:' + '//' + window.location.hostname + ':5173'
            : 'ws:' + '//' + window.location.hostname + ':5173',
        NODE_ENV: 'development',
        VERSION: '1.0.0'
      };

      // Global Fixes
      window.global = window;
      var global = global || window;
    </script>

    <!-- ✅ Page Title -->
    <title>Teralynk - The Future of Collaborative Cloud Storage</title>
  </head>

  <body>
    <!-- ✅ No-JavaScript Fallback -->
    <noscript>
      <div
        style="padding: 20px; text-align: center; background-color: #fee2e2; color: #dc2626; border: 1px solid #dc2626;"
      >
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript in your browser settings to continue using Teralynk.</p>
      </div>
    </noscript>

    <!-- ✅ Root Mount Point -->
    <div id="root">
      <div class="initial-loading" role="status" aria-label="Loading application">
        <svg
          class="loading-spinner"
          width="40"
          height="40"
          viewBox="0 0 40 40"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle
            cx="20"
            cy="20"
            r="18"
            fill="none"
            stroke="currentColor"
            stroke-width="4"
            stroke-dasharray="89,89"
          >
            <animateTransform
              attributeName="transform"
              attributeType="XML"
              type="rotate"
              dur="1s"
              from="0 20 20"
              to="360 20 20"
              repeatCount="indefinite"
            />
          </circle>
        </svg>
        <p>Loading Teralynk...</p>
      </div>
    </div>

    <!-- ✅ Modal/Portal Root -->
    <div id="portal-root"></div>

    <!-- ✅ Load Main Application Bundle -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
