<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Information -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007bff" /> <!-- Updated theme color to match branding -->
    <meta
      name="description"
      content="Teralynk - The ultimate collaborative and creative cloud storage platform for productivity and teamwork."
    />
    <title>Teralynk - The Collaborative Storage Platform</title>

    <!-- Favicon and App Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph Meta Tags for Social Media Sharing -->
    <meta property="og:title" content="Teralynk - The Collaborative Storage Platform" />
    <meta property="og:description" content="Collaborative cloud storage and creativity in one platform." />
    <meta property="og:image" content="/logo192.png" />
    <meta property="og:url" content="https://teralynk.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Teralynk - The Collaborative Storage Platform" />
    <meta name="twitter:description" content="Collaborative cloud storage and creativity in one platform." />
    <meta name="twitter:image" content="/logo192.png" />

    <!-- Additional Meta for Performance and SEO -->
    <meta name="keywords" content="cloud storage, collaboration, file sharing, creative tools, productivity, teamwork" />
    <meta name="author" content="Teralynk Team" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="YOUR_GOOGLE_SITE_VERIFICATION_CODE" /> <!-- Optional for Google Search Console -->

    <!-- Viewport and PWA Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Teralynk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/global.css" />

    <!-- Prefetching and Performance -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preload" href="/styles/global.css" as="style" />
    <link rel="preload" href="/src/main.jsx" as="script" />

    <!-- Scripts are bundled by Vite -->
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <!-- Fallback for No JavaScript -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React App Mount Point -->
    <div id="root"></div>
  </body>
</html>
