name: Deploy to Environment

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, uat, main]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16.x'

    - name: Install Dependencies
      run: npm install

    - name: Deploy to ${{ matrix.environment }} Environment
      env:
        API_KEY: ${{ secrets.API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        ENVIRONMENT: ${{ matrix.environment }}
        ACTIONS_STEP_DEBUG: true  # Enable detailed debug logs
      run: |
        echo "Starting deployment to ${{ matrix.environment }} environment..."
        
        if [[ "${{ matrix.environment }}" == "dev" ]]; then
          echo "Running Development Deployment Commands"
          npm run build:dev || exit 1
          npm run deploy:dev || exit 1
        elif [[ "${{ matrix.environment }}" == "uat" ]]; then
          echo "Running UAT Deployment Commands"
          npm run build:uat || exit 1
          npm run deploy:uat || exit 1
        elif [[ "${{ matrix.environment }}" == "main" ]]; then
          echo "Running Production Deployment Commands"
          npm run build:prod || exit 1
          npm run deploy:prod || exit 1
        fi

    - name: Notify Success
      if: success()
      run: |
        echo "✅ Deployment to ${{ matrix.environment }} was successful"

    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ Deployment to ${{ matrix.environment }} failed"
